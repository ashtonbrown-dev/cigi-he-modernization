<h2>GLAYER_THICKNESS</h2>
<blockquote>
  <p>Specifies the vertical thickness of a global weather layer.</p>
  <h3>Syntax

  </h3>

  <blockquote>
    <p>GLAYER_THICKNESS &nbsp;&nbsp; <i>id&nbsp;&nbsp;&nbsp; height</i></p>
  </blockquote>

  <h3>Parameters
  </h3>
  <blockquote>
      <p><i>id</i></p>
      <blockquote>
        <p>An integer specifying the global weather layer.</p>
      </blockquote>
      <p><i>height</i></p>
      <blockquote>
        <p>The desired thickness of the layer in meters.</p>
      </blockquote>
  </blockquote>

</blockquote>

[ExternalTabs]
Count=0
StartupTab=Messages

; This tracked file is intentionally safe by default.
; Put private or machine-specific tools in external_tabs.user.ini.
;
; Example:
; Set StartupTab=ADI in [ExternalTabs] to select and launch this tab at startup.
; [ExternalTab0]
; Enabled=1
; Title=ADI
; Executable=..\..\..\tools\cigi-adi\dist\cigi-adi\cigi-adi.exe
; WorkingDirectory=..\..\..\tools\cigi-adi\dist\cigi-adi
; Arguments=--embedded --cigi --listen 0.0.0.0:8014 --reply 127.0.0.1:8015
; LaunchOnSelect=1
; CloseWithHemu=1
; CloseWithHemu tools are contained in a kill-on-close Windows Job Object so
; they also terminate if HEMU exits without completing normal page shutdown.

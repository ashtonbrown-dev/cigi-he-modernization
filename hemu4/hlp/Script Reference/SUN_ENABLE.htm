<h2>SUN_ENABLE</h2>
<blockquote>
  <p>Enables or disables the sun object.</p>
  <h3>Syntax

  </h3>

  <blockquote>
    <p>SUN_ENABLE&nbsp;&nbsp;&nbsp; <i>state</i></p>
  </blockquote>

  <h3>Parameters
  </h3>
  <blockquote>
      <p><i>state</i></p>
      <blockquote>
        <p>May be either of the following values:</p>
        <p>&nbsp;&nbsp;&nbsp; 0 — Disables sun</p>
        <p>&nbsp;&nbsp;&nbsp; 1 — Enables sun</p>
      </blockquote>
  </blockquote>
</blockquote>
